<!-- admin.html -->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>G&V Sweet House Admin</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="admin.css">
</head>

<body>

  <div class="panel">

    <!-- TOPBAR -->

    <div class="topbar">

      <h2>G&V Sweet House 🍬</h2>

      <div class="tabs">

        <button id="tabPedidos" class="active">
          Pedidos
        </button>

        <button id="tabDashboard">
          Dashboard
        </button>

      </div>

    </div>

    <!-- CONTAINER -->

    <div class="container">

      <!-- PEDIDOS -->

      <div class="orders-area">

        <div class="left-side">

          <!-- SEARCH -->

          <div class="search-box">

            <input
              type="text"
              id="searchInput"
              placeholder="Pesquisar cliente..."
            >

          </div>

          <!-- ORDERS -->

          <div class="orders" id="orders"></div>

        </div>

        <!-- SIDEBAR -->

        <div class="sidebar">

          <div class="side-card">

            <h3>📦 Resumo</h3>

            <div class="info">
              <span>Pedidos Hoje</span>
              <strong id="todayOrders">0</strong>
            </div>

            <div class="info">
              <span>Entregues</span>
              <strong id="doneOrders">0</strong>
            </div>

            <div class="info">
              <span>Preparando</span>
              <strong id="prepOrders">0</strong>
            </div>

          </div>

          <div class="side-card">

            <h3>💰 Faturamento</h3>

            <h1 id="faturamento">
              R$ 0
            </h1>

          </div>

          <div class="side-card">

            <h3>🕒 Atividade</h3>

            <ul id="activity">

              <li>Nenhuma atividade</li>

            </ul>

          </div>

        </div>

      </div>

      <!-- DASHBOARD -->

      <div class="dashboard">

        <div class="cards">

          <div class="card">
            <p>Total</p>
            <h3 id="total">R$ 0</h3>
          </div>

          <div class="card">
            <p>Pedidos</p>
            <h3 id="pedidosCount">0</h3>
          </div>

          <div class="card">
            <p>Clientes</p>
            <h3 id="clientesCount">0</h3>
          </div>

        </div>

        <div class="chart-box">
          <canvas id="chart"></canvas>
        </div>

      </div>

    </div>

  </div>

  <script type="module" src="admin.js"></script>

</body>

</html>
