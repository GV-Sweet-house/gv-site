<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin G&V Sweet House</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="admin.css">
</head>

<body>

  <!-- 🔐 LOGIN -->
  <div id="loginBox" class="login-box">
    <h2>Login Admin</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Senha">

    <button id="loginBtn">Entrar</button>
  </div>

  <!-- 📦 PAINEL -->
  <div id="panel" class="hidden">

    <div class="topbar">
      <h3>G&V Sweet House 🍬</h3>

      <div class="tabs">
        <button id="tab1" class="active">Pedidos</button>
        <button id="tab2">Dashboard</button>
      </div>
    </div>

    <div class="container">

      <div id="pedidos"></div>

      <div id="dash" class="hidden">

        <div class="cards">
          <div class="card">
            Total
            <h3 id="total">0</h3>
          </div>

          <div class="card">
            Pedidos
            <h3 id="count">0</h3>
          </div>

          <div class="card">
            Clientes
            <h3 id="clientes">0</h3>
          </div>
        </div>

        <canvas id="chart"></canvas>

      </div>
    </div>
  </div>

  <script type="module" src="admin.js"></script>

</body>

</html>
